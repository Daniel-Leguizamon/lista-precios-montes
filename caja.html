<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caja - Montes</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 1000px;
    margin: 30px auto;
    padding: 20px;
}

h1{
    text-align:center;
}

#codigo{
    width:100%;
    padding:15px;
    font-size:28px;
    margin-bottom:20px;
    box-sizing:border-box;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border-bottom:1px solid #ddd;
    padding:12px;
}

th{
    text-align:left;
}

.total{
    margin-top:20px;
    font-size:30px;
    font-weight:bold;
    text-align:right;
}

.botones{
    margin-top:20px;
    display:flex;
    gap:10px;
}

button{
    padding:15px 25px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>Caja Montes</h1>

<input
    type="text"
    id="codigo"
    placeholder="Escaneá un producto..."
    autofocus
>

<table>
    <thead>
        <tr>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Subtotal</th>
        </tr>
    </thead>

    <tbody id="ticket"></tbody>
</table>

<div class="total" id="total">
    Total: $ 0
</div>

<div class="botones">
    <button onclick="vaciar()">Vaciar</button>
    <button onclick="window.print()">Imprimir</button>
</div>

<script>

let productos = [];
let carrito = [];

async function cargarCSV() {

    const response = await fetch("./lista_precios.csv");
    const texto = await response.text();

    const lineas = texto.split("\n");

    for(let i = 1; i < lineas.length; i++) {

        if(!lineas[i]) continue;

        const cols = lineas[i].split(";");

        productos.push({
            description: cols[0]?.trim(),
            category: cols[1]?.trim(),
            price: Number(
                cols[2]
                    ?.replace(/\./g,"")
                    ?.replace(",",".")
                    ?.replace(/[^0-9.]/g,"")
            ) || 0,
            code: cols[3]?.trim()
        });
    }
}

function escanear(codigo){

    const producto = productos.find(
        p => p.code === codigo
    );

    if(!producto){
        alert("Producto no encontrado");
        return;
    }

    const existente = carrito.find(
        p => p.code === codigo
    );

    if(existente){
        existente.cantidad++;
    }else{
        carrito.push({
            ...producto,
            cantidad:1
        });
    }

    actualizarTicket();
}

function actualizarTicket(){

    const tbody = document.getElementById("ticket");

    tbody.innerHTML = "";

    let total = 0;

    carrito.forEach(item => {

        const subtotal = item.price * item.cantidad;

        total += subtotal;

        tbody.innerHTML += `
            <tr>
                <td>${item.description}</td>
                <td>${item.cantidad}</td>
                <td>$ ${subtotal.toLocaleString("es-AR")}</td>
            </tr>
        `;
    });

    document.getElementById("total").innerText =
        "Total: $ " + total.toLocaleString("es-AR");
}

function vaciar(){
    carrito = [];
    actualizarTicket();
}

document.getElementById("codigo").addEventListener("change", function(){

    const codigo = this.value.trim();

    if(codigo !== ""){
        escanear(codigo);
    }

    this.value = "";

});

cargarCSV();

</script>

</body>
</html>
