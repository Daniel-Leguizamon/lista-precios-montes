<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caja Montes</title>
<style>
body{font-family:Arial,sans-serif;max-width:1100px;margin:20px auto;padding:20px}
.scanner{display:flex;gap:10px;margin-bottom:20px}
#codigo{flex:1;padding:15px;font-size:24px}
button{padding:12px 20px;font-size:16px;cursor:pointer}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #ddd}
.total{font-size:28px;text-align:right;margin:20px 0;font-weight:bold}
.botones{display:flex;gap:10px;flex-wrap:wrap}
</style>
</head>
<body>
<h1>Caja Montes</h1>

<div class="scanner">
<input id="codigo" placeholder="Escaneá un producto..." autofocus>
<button id="btn-varios">Varios</button>
</div>

<table>
<thead><tr><th>Producto</th><th>Cant.</th><th>Subtotal</th><th></th></tr></thead>
<tbody id="ticket"></tbody>
</table>

<div class="total" id="total">Total: $0</div>

<div class="botones">
<button onclick="vaciar()">Vaciar</button>
<button onclick="imprimirTicket()">Imprimir</button>
<button onclick="cobrar()">Cobrar</button>
<button onclick="historial()">Historial</button>
</div>

<script>
let productos=[],carrito=[];

async function cargarCSV(){
 const txt=await (await fetch("./lista_precios.csv")).text();
 const lineas=txt.split("\n");
 for(let i=1;i<lineas.length;i++){
  if(!lineas[i]) continue;
  const c=lineas[i].split(";");
  productos.push({
   description:c[0]?.trim(),
   category:c[1]?.trim(),
   price:Number(c[2]?.replace(/\./g,"").replace(",",".").replace(/[^0-9.]/g,""))||0,
   code:c[3]?.trim()
  });
 }
}

function agregar(item){
 const ex=carrito.find(x=>x.code===item.code);
 if(ex) ex.cantidad++;
 else carrito.push({...item,cantidad:1});
 render();
}

function render(){
 const tb=document.getElementById("ticket");
 tb.innerHTML="";
 let total=0;
 carrito.forEach((i,idx)=>{
  const sub=i.price*i.cantidad; total+=sub;
  tb.innerHTML+=`<tr><td>${i.description}</td><td>${i.cantidad}</td><td>$ ${sub.toLocaleString("es-AR")}</td><td><button onclick="borrar(${idx})">❌</button></td></tr>`;
 });
 document.getElementById("total").innerText="Total: $ "+total.toLocaleString("es-AR");
}

function borrar(i){carrito.splice(i,1);render();}
function vaciar(){carrito=[];render();}

document.getElementById("codigo").addEventListener("change",function(){
 const p=productos.find(x=>x.code===this.value.trim());
 if(p) agregar(p); else alert("Producto no encontrado");
 this.value="";
});

document.getElementById("btn-varios").onclick=()=>{
 const v=prompt("Precio para Varios:");
 if(!v) return;
 carrito.push({description:"Varios",price:Number(v.replace(",",".")),code:"VAR"+Date.now(),cantidad:1});
 render();
};

function imprimirTicket(){
 let w=window.open("","","width=300,height=600");
 let total=carrito.reduce((a,b)=>a+b.price*b.cantidad,0);
 let html="<h3>MONTES</h3>";
 carrito.forEach(i=>html+=`<div>${i.cantidad}x ${i.description} - $ ${(i.price*i.cantidad).toLocaleString("es-AR")}</div>`);
 html+=`<hr><b>TOTAL: $ ${total.toLocaleString("es-AR")}</b>`;
 w.document.write(html);w.print();w.close();
}

function cobrar(){
 if(!carrito.length) return alert("No hay productos");
 const medio=prompt("Medio de pago:\n1-Efectivo\n2-Débito\n3-Transferencia");
 const mapa={"1":"Efectivo","2":"Débito","3":"Transferencia"};
 if(!mapa[medio]) return;
 const ventas=JSON.parse(localStorage.getItem("ventas")||"[]");
 ventas.push({fecha:new Date().toLocaleString("es-AR"),medio:mapa[medio],total:carrito.reduce((a,b)=>a+b.price*b.cantidad,0),items:carrito});
 localStorage.setItem("ventas",JSON.stringify(ventas));
 alert("Venta guardada en "+mapa[medio]);
 vaciar();
}

function historial(){
 const ventas=JSON.parse(localStorage.getItem("ventas")||"[]");
 alert(ventas.map(v=>`${v.fecha} - ${v.medio} - $ ${v.total.toLocaleString("es-AR")}`).join("\n")||"Sin ventas");
}

cargarCSV();
</script>
</body>
</html>
